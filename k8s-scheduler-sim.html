<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>K8s Interactive Scheduler</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1e1e1e; color: #eee; padding: 20px; max-width: 1000px; margin: auto; }
  h2 { color: #61dafb; text-align: center; }
  .dashboard { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
  .panel { background: #2d2d2d; border-radius: 8px; padding: 15px; flex: 1; min-width: 300px; border: 1px solid #444; }
  .panel h3 { margin-top: 0; color: #ffca28; border-bottom: 1px solid #444; padding-bottom: 5px; }
  .setting-row { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  select { background: #444; color: #fff; border: 1px solid #666; padding: 5px; border-radius: 4px; outline: none; cursor: pointer; }
  
  .board { display: flex; justify-content: space-between; gap: 15px; margin-top: 20px; }
  .node { border: 2px dashed #666; border-radius: 8px; flex: 1; padding: 10px; background: #252525; min-height: 200px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
  .node h4 { margin: 5px 0 15px 0; color: #4fc3f7; }
  .node.active { border-color: #4CAF50; background: #1b3320; box-shadow: 0 0 10px #4CAF50; }
  .node.error { border-color: #F44336; background: #3d1c1c; opacity: 0.8; }
  
  .pod { background: #2196F3; padding: 10px 15px; border-radius: 6px; font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.4); margin-top: auto; margin-bottom: auto; width: 80%; transition: 0.3s; }
  
  .actions { text-align: center; margin: 20px 0; }
  .btn { padding: 12px 24px; font-size: 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: white; transition: 0.2s; }
  .btn-run { background: #4CAF50; }
  .btn-run:hover { background: #45a049; }
  
  #explanation-box { background: #111; border-left: 4px solid #61dafb; padding: 15px; border-radius: 4px; font-family: monospace; font-size: 14px; line-height: 1.5; margin-top: 20px; white-space: pre-wrap; display: none; }
  .success-text { color: #4CAF50; }
  .error-text { color: #F44336; }
</style>
</head>
<body>

  <h2>☸️ K8s Scheduler: Interactive Edition</h2>

  <div class="dashboard">
    <!-- Pod Settings -->
    <div class="panel">
      <h3>📦 Pod Settings</h3>
      <div class="setting-row">
        <label>NodeSelector (Labels):</label>
        <select id="pod-selector">
          <option value="any">Any (Not specified)</option>
          <option value="ssd">disk=ssd</option>
          <option value="hdd">disk=hdd</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Tolerations:</label>
        <select id="pod-toleration">
          <option value="none">None</option>
          <option value="gpu">Tolerate: gpu=true</option>
          <option value="cpu">Tolerate: high-cpu=true</option>
        </select>
      </div>
    </div>

    <!-- Node Settings -->
    <div class="panel">
      <h3>🖥️ Node Settings</h3>
      
      <div class="setting-row">
        <label><b>Node 1:</b> Label</label>
        <select id="n1-label"><option value="hdd">disk=hdd</option><option value="ssd">disk=ssd</option></select>
        <select id="n1-taint"><option value="none">No Taint</option><option value="gpu">Taint: gpu=true</option><option value="cpu">Taint: high-cpu</option></select>
      </div>
      
      <div class="setting-row">
        <label><b>Node 2:</b> Label</label>
        <select id="n2-label"><option value="ssd" selected>disk=ssd</option><option value="hdd">disk=hdd</option></select>
        <select id="n2-taint"><option value="gpu" selected>Taint: gpu=true</option><option value="cpu">Taint: high-cpu</option><option value="none">No Taint</option></select>
      </div>

      <div class="setting-row">
        <label><b>Node 3:</b> Label</label>
        <select id="n3-label"><option value="ssd" selected>disk=ssd</option><option value="hdd">disk=hdd</option></select>
        <select id="n3-taint"><option value="none" selected>No Taint</option><option value="gpu">Taint: gpu=true</option><option value="cpu">Taint: high-cpu</option></select>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-run" onclick="runScheduler()">🚀 Schedule Pod</button>
  </div>

  <!-- Cluster Board -->
  <div class="board">
    <div id="pod-queue" style="width: 200px; border: 2px solid #555; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; align-items: center; background: #222;">
      <h4 style="margin-top:0; color: #aaa;">Queue (Pending)</h4>
      <div id="the-pod" class="pod">📦 My Pod</div>
    </div>

    <div class="node" id="node-1"><h4>Node 1</h4><div id="n1-ui"></div></div>
    <div class="node" id="node-2"><h4>Node 2</h4><div id="n2-ui"></div></div>
    <div class="node" id="node-3"><h4>Node 3</h4><div id="n3-ui"></div></div>
  </div>

  <!-- Explanation Box -->
  <div id="explanation-box"></div>

  <script>
    function updateNodeUI() {
      for(let i=1; i<=3; i++) {
        let lbl = document.getElementById(`n${i}-label`).value;
        let tnt = document.getElementById(`n${i}-taint`).value;
        document.getElementById(`n${i}-ui`).innerHTML = 
          `🏷️ <b>Label:</b> disk=${lbl}<br><br>🛑 <b>Taint:</b> ${tnt === 'none' ? 'None' : tnt+'=true'}`;
      }
    }
    
    document.querySelectorAll('select').forEach(el => el.addEventListener('change', updateNodeUI));
    updateNodeUI(); 

    function runScheduler() {
      const podSelector = document.getElementById('pod-selector').value;
      const podToleration = document.getElementById('pod-toleration').value;
      const podEl = document.getElementById('the-pod');
      
      let explanation = "<b>🔍 kube-scheduler log:</b>\n\n";
      let eligibleNodes = [];

      document.querySelectorAll('.node').forEach(n => n.classList.remove('active', 'error'));

      for(let i=1; i<=3; i++) {
        let nodeEl = document.getElementById(`node-${i}`);
        let nLabel = document.getElementById(`n${i}-label`).value;
        let nTaint = document.getElementById(`n${i}-taint`).value;
        
        let reason = [];
        let isMatch = true;

        // NodeSelector check
        if (podSelector !== 'any' && podSelector !== nLabel) {
          isMatch = false;
          reason.push(`❌ Label mismatch (Pod requires disk=${podSelector}, but node has disk=${nLabel}).`);
        } else {
          reason.push(`✅ Label matches.`);
        }

        // Taints/Tolerations check
        if (nTaint !== 'none' && nTaint !== podToleration) {
          isMatch = false;
          reason.push(`❌ Taint blocks (Node has ${nTaint}=true, Pod lacks toleration).`);
        } else if (nTaint !== 'none' && nTaint === podToleration) {
          reason.push(`✅ Taint present (${nTaint}), but Pod has the required Toleration!`);
        } else {
          reason.push(`✅ No taints present.`);
        }

        if (isMatch) {
          explanation += `🖥️ <b>Node ${i}:</b> <span class="success-text">ELIGIBLE</span>\n   ${reason.join('\n   ')}\n\n`;
          eligibleNodes.push(nodeEl);
        } else {
          explanation += `🖥️ <b>Node ${i}:</b> <span class="error-text">REJECTED</span>\n   ${reason.join('\n   ')}\n\n`;
          nodeEl.classList.add('error');
        }
      }

      if (eligibleNodes.length > 0) {
        let chosenNode = eligibleNodes[0];
        chosenNode.classList.add('active');
        chosenNode.appendChild(podEl);
        podEl.style.background = "#4CAF50";
        explanation += `🎉 <b>RESULT:</b> Pod successfully scheduled on <b>${chosenNode.querySelector('h4').innerText}</b>!`;
      } else {
        document.getElementById('pod-queue').appendChild(podEl);
        podEl.style.background = "#F44336";
        explanation += `😭 <b>RESULT:</b> Pod stuck in <b>Pending</b> status. No eligible nodes found!`;
      }

      const explBox = document.getElementById('explanation-box');
      explBox.innerHTML = explanation;
      explBox.style.display = 'block';
    }
  </script>
</body>
</html>
