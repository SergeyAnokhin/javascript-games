<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☸️ K8s Scheduler Quest</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #060614;
  --bg2: #0c0c22;
  --bg3: #12122e;
  --bg4: #18183a;
  --cyan: #00f5ff;
  --green: #00ff88;
  --red: #ff3355;
  --yellow: #ffd700;
  --purple: #bb44ff;
  --orange: #ff9900;
  --pink: #ff44bb;
  --text: #b8b8e8;
  --text-bright: #e8e8ff;
  --text-dim: #5858a0;
  --border: #2222aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 50px 50px;
  opacity: 0.07;
  pointer-events: none;
  z-index: 0;
}
.wrap { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 16px; }

/* ---- HEADER ---- */
.hdr { text-align: center; padding: 18px 0 14px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.hdr-title {
  font-family: 'Orbitron', monospace; font-size: 2.4em; font-weight: 900;
  color: var(--cyan); letter-spacing: 4px;
  text-shadow: 0 0 12px #00f5ff80, 0 0 40px #00f5ff30;
  animation: gpulse 3s ease-in-out infinite;
}
.hdr-sub { color: var(--text-dim); font-size: 0.82em; letter-spacing: 3px; margin-top: 4px; }
@keyframes gpulse {
  0%,100%{ text-shadow: 0 0 10px #00f5ff60, 0 0 30px #00f5ff20; }
  50%    { text-shadow: 0 0 22px #00f5ff, 0 0 60px #00f5ff80; }
}
.mode-btns { display: flex; justify-content: center; gap: 14px; margin-top: 14px; }
.mbtn {
  background: var(--bg3); color: var(--text);
  border: 2px solid var(--border); padding: 9px 28px;
  font-family: 'Orbitron', monospace; font-size: 0.78em;
  cursor: pointer; transition: all .25s; letter-spacing: 2px;
}
.mbtn:hover, .mbtn.act { border-color: var(--cyan); color: var(--cyan); background: #00f5ff12; box-shadow: 0 0 12px #00f5ff40; }

/* ---- PANELS ---- */
.panel { background: var(--bg2); border: 1px solid var(--border); position: relative; overflow: hidden; }
.panel::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background: linear-gradient(90deg,transparent,var(--cyan),transparent); }
.ph { padding: 9px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); display:flex; align-items:center; gap:8px; font-family:'Orbitron',monospace; font-size:.72em; letter-spacing:2px; color:var(--cyan); }
.pb { padding: 14px; }

/* ---- SETTINGS BAR ---- */
.sbar { display:flex; align-items:center; gap:16px; padding:9px 14px; background:var(--bg2); border:1px solid var(--border); margin-bottom:14px; flex-wrap:wrap; font-size:.82em; }
.sbar label { color:var(--text-dim); display:flex; align-items:center; gap:6px; }
.sbar input[type=number], .sbar select {
  background:var(--bg3); color:var(--text); border:1px solid var(--border);
  padding:4px 8px; font-family:inherit; font-size:.85em; width:60px;
}
.sbar input:focus, .sbar select:focus { outline:none; border-color:var(--cyan); }

/* ---- BUTTONS ---- */
.btn { background:transparent; border:1px solid; padding:7px 18px; cursor:pointer; font-family:'Orbitron',monospace; font-size:.7em; letter-spacing:1px; transition:all .2s; }
.btn-c { border-color:var(--cyan); color:var(--cyan); }
.btn-c:hover { background:var(--cyan); color:var(--bg); box-shadow:0 0 12px #00f5ff60; }
.btn-g { border-color:var(--green); color:var(--green); }
.btn-g:hover { background:var(--green); color:var(--bg); box-shadow:0 0 12px #00ff8860; }
.btn-r { border-color:var(--red); color:var(--red); }
.btn-r:hover { background:var(--red); color:var(--bg); box-shadow:0 0 12px #ff335560; }
.btn-y { border-color:var(--yellow); color:var(--yellow); }
.btn-y:hover { background:var(--yellow); color:var(--bg); box-shadow:0 0 12px #ffd70060; }

/* ---- SANDBOX LAYOUT ---- */
.sbx-layout { display:grid; grid-template-columns:300px 1fr; gap:14px; }
.pod-col { grid-row: 1 / 3; }

/* ---- POD CONFIG ---- */
.csec { margin-bottom:10px; border:1px solid var(--border); }
.csh {
  padding:7px 12px; background:var(--bg3); border-bottom:1px solid var(--border);
  cursor:pointer; display:flex; align-items:center; justify-content:space-between;
  font-size:.78em; color:var(--text); transition:color .2s;
  user-select:none;
}
.csh:hover { color:var(--cyan); }
.csh .arr { transition:transform .2s; font-size:.7em; }
.csh.open .arr { transform:rotate(90deg); }
.csb { padding:10px; display:none; }
.csb.open { display:block; }
.fr { display:flex; flex-direction:column; gap:3px; margin-bottom:9px; }
.fr label { font-size:.72em; color:var(--text-dim); }
.fr input, .fr select, .fr textarea {
  background:var(--bg3); color:var(--text); border:1px solid var(--border);
  padding:5px 9px; font-family:inherit; font-size:.8em; width:100%; transition:border-color .2s;
}
.fr input:focus, .fr select:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 5px #00f5ff30; }
.rrow { display:flex; align-items:center; gap:8px; }
.rrow input[type=range] {
  flex:1; -webkit-appearance:none; height:4px; background:var(--border); border:none; padding:0; cursor:pointer;
}
.rrow input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px; background:var(--cyan); border-radius:50%; box-shadow:0 0 6px #00f5ff80;
}
.rv { min-width:70px; text-align:right; font-size:.78em; color:var(--cyan); }
.add-btn { background:transparent; color:var(--cyan); border:1px dashed var(--cyan); padding:4px 10px; cursor:pointer; font-family:inherit; font-size:.75em; width:100%; transition:all .2s; margin-top:5px; }
.add-btn:hover { background:#00f5ff10; box-shadow:0 0 8px #00f5ff30; }
.rule-item { background:var(--bg4); border:1px solid var(--border); padding:7px; margin-bottom:5px; position:relative; }
.rule-item .del { position:absolute; top:4px; right:7px; cursor:pointer; color:var(--red); font-size:1em; line-height:1; }
.rule-item .del:hover { text-shadow:0 0 8px var(--red); }
.mini-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.tag-input { display:flex; flex-wrap:wrap; gap:4px; padding:5px; background:var(--bg3); border:1px solid var(--border); min-height:34px; }
.tag { background:#00f5ff20; border:1px solid var(--cyan); color:var(--cyan); padding:2px 7px; font-size:.72em; display:flex; align-items:center; gap:4px; }
.tag .x { cursor:pointer; color:var(--red); }

/* ---- NODE CARDS ---- */
.ngrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:13px; padding:13px; }
.ncard {
  background:var(--bg3); border:2px solid var(--border);
  cursor:pointer; transition:all .35s; position:relative; overflow:hidden;
}
.ncard::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent 60%,#ffffff05); pointer-events:none; }
.ncard:hover { transform:translateY(-3px); border-color:var(--cyan); box-shadow:0 0 14px #00f5ff40; }
.ncard.ok { border-color:var(--green); box-shadow:0 0 14px #00ff8860; animation:okpulse 2s ease-in-out infinite; }
.ncard.fail { border-color:var(--red); box-shadow:0 0 12px #ff335540; }
.ncard.warn { border-color:var(--yellow); box-shadow:0 0 12px #ffd70040; }
.ncard.sel { border-color:var(--yellow); box-shadow:0 0 18px #ffd70080; animation:selpulse .6s ease-in-out infinite alternate; }
.ncard.qok { border-color:var(--green); animation:qokbounce .5s ease; }
.ncard.qfail { border-color:var(--red); animation:qfailshake .4s ease; }
@keyframes okpulse { 0%,100%{box-shadow:0 0 10px #00ff8860;} 50%{box-shadow:0 0 22px #00ff88;} }
@keyframes selpulse { 0%{box-shadow:0 0 10px #ffd70060;} 100%{box-shadow:0 0 24px #ffd700;} }
@keyframes qokbounce { 0%,100%{transform:translateY(0);} 30%{transform:translateY(-8px);} 60%{transform:translateY(-3px);} }
@keyframes qfailshake { 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-6px);} 40%,80%{transform:translateX(6px);} }
.nhdr { display:flex; align-items:center; gap:7px; padding:9px 11px; background:var(--bg4); border-bottom:1px solid var(--border); }
.nemoji { font-size:1.4em; }
.nname { font-family:'Orbitron',monospace; font-size:.65em; color:var(--text-bright); letter-spacing:1px; flex:1; }
.ndot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 5px var(--green); animation:blink 2s ease-in-out infinite; }
.ndot.off { background:var(--red); box-shadow:0 0 5px var(--red); }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }
.nbody { padding:9px 11px; }
.rbar { margin-bottom:7px; }
.rbar-lbl { display:flex; justify-content:space-between; font-size:.68em; color:var(--text-dim); margin-bottom:2px; }
.rbar-bg { height:7px; background:var(--bg); border:1px solid var(--border); overflow:hidden; }
.rbar-fill { height:100%; transition:width .5s; }
.rbar-fill.low  { background:linear-gradient(90deg,var(--cyan),var(--purple)); }
.rbar-fill.mid  { background:linear-gradient(90deg,var(--yellow),var(--orange)); }
.rbar-fill.high { background:linear-gradient(90deg,var(--orange),var(--red)); }
.nlabels { display:flex; flex-wrap:wrap; gap:3px; margin-top:7px; }
.lbl { background:var(--bg); border:1px solid var(--border); padding:1px 5px; font-size:.62em; color:var(--text-dim); }
.lbl.match { border-color:var(--green); color:var(--green); }
.lbl.mismatch { border-color:var(--red); color:var(--red); }
.taint-badges { display:flex; flex-wrap:wrap; gap:3px; margin-top:5px; }
.tbadge { background:#ff220018; border:1px solid #ff220070; padding:1px 5px; font-size:.62em; color:var(--red); }
.tbadge.warn { background:#ff880018; border-color:#ff880070; color:var(--orange); }
.tbadge.ok   { background:#00880018; border-color:#00880070; color:var(--green); }
.nstatus { padding:5px 11px; text-align:center; font-family:'Orbitron',monospace; font-size:.65em; letter-spacing:2px; border-top:1px solid var(--border); }
.nstatus.ok   { color:var(--green); background:#00ff8810; }
.nstatus.fail { color:var(--red); background:#ff335510; }
.nstatus.q    { color:var(--text-dim); }
.cond-badges { display:flex; flex-wrap:wrap; gap:3px; margin-top:4px; }
.cbadge { padding:1px 5px; font-size:.6em; border:1px solid; }
.cbadge.good { border-color:var(--green); color:var(--green); }
.cbadge.bad  { border-color:var(--red); color:var(--red); }

/* ---- LOGS ---- */
.logbox { height:240px; overflow-y:auto; padding:9px; background:var(--bg); font-size:.76em; line-height:1.5; }
.logbox::-webkit-scrollbar { width:5px; }
.logbox::-webkit-scrollbar-thumb { background:var(--border); }
.le { padding:2px 0; border-bottom:1px solid #ffffff06; animation:lein .15s ease; }
@keyframes lein { from{opacity:0;transform:translateX(-8px);} to{opacity:1;transform:translateX(0);} }
.le.ok   { color:var(--green); }
.le.fail { color:var(--red); }
.le.warn { color:var(--yellow); }
.le.info { color:var(--cyan); }
.le.dim  { color:var(--text-dim); }
.le.node { color:var(--purple); font-family:'Orbitron',monospace; font-size:.85em; margin-top:7px; padding-top:4px; border-top:1px solid var(--border); border-bottom:none; }

/* ---- MODAL ---- */
.overlay { position:fixed; inset:0; background:#00000099; backdrop-filter:blur(4px); z-index:100; display:none; align-items:center; justify-content:center; }
.overlay.show { display:flex; }
.modal { background:var(--bg2); border:2px solid var(--cyan); box-shadow:0 0 40px #00f5ff30; width:92%; max-width:680px; max-height:88vh; display:flex; flex-direction:column; animation:min .3s ease; }
@keyframes min { from{opacity:0;transform:scale(.88);} to{opacity:1;transform:scale(1);} }
.mhdr { padding:13px 18px; background:var(--bg3); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; font-family:'Orbitron',monospace; font-size:.8em; color:var(--cyan); letter-spacing:2px; }
.mclose { cursor:pointer; color:var(--text-dim); font-size:1.2em; transition:color .2s; }
.mclose:hover { color:var(--red); }
.mbody { flex:1; overflow-y:auto; padding:18px; }
.mbody::-webkit-scrollbar { width:5px; }
.mbody::-webkit-scrollbar-thumb { background:var(--border); }
.mftr { padding:11px 18px; background:var(--bg3); border-top:1px solid var(--border); display:flex; gap:9px; justify-content:flex-end; }
.yaml { background:var(--bg); border:1px solid var(--border); padding:14px; font-size:.78em; line-height:1.65; white-space:pre; overflow-x:auto; color:var(--text); }
.yk { color:var(--cyan); }
.yv { color:var(--green); }
.ys { color:var(--yellow); }
.yc { color:var(--text-dim); }

/* ---- QUIZ ---- */
.qhdr { display:flex; align-items:center; justify-content:space-between; padding:13px 16px; background:var(--bg2); border:1px solid var(--border); margin-bottom:14px; }
.qscore { font-family:'Orbitron',monospace; font-size:1.15em; color:var(--yellow); text-shadow:0 0 10px #ffd70060; }
.qprog { color:var(--text-dim); font-size:.82em; }
.qscen { background:var(--bg2); border:1px solid var(--purple); padding:14px; margin-bottom:14px; position:relative; }
.qscen::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,transparent,var(--purple),transparent); }
.qstitle { font-family:'Orbitron',monospace; color:var(--purple); font-size:.8em; letter-spacing:2px; margin-bottom:8px; }
.qinstr { color:var(--text); font-size:.88em; margin-bottom:10px; }
.hint-box { background:#ffd70012; border:1px solid #ffd70050; padding:7px 11px; font-size:.8em; color:var(--yellow); margin-top:8px; }
.qnodes { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:13px; margin-bottom:14px; }
.qbtns { display:flex; gap:10px; justify-content:center; margin-bottom:14px; }
.qexp { background:var(--bg2); border:1px solid var(--border); padding:14px; display:none; }
.qexp.show { display:block; }
.qexptitle { font-family:'Orbitron',monospace; font-size:.78em; letter-spacing:2px; margin-bottom:9px; }
.qexptitle.ok   { color:var(--green); }
.qexptitle.fail { color:var(--red); }
.qexplog { height:180px; overflow-y:auto; font-size:.75em; line-height:1.5; }

/* ---- GAME OVER ---- */
.gameover { text-align:center; padding:60px 20px; }
.gotitle { font-family:'Orbitron',monospace; font-size:2.8em; font-weight:900; color:var(--yellow); text-shadow:0 0 20px #ffd70080; animation:gpulse 1s ease-in-out infinite; margin-bottom:16px; }
.goscore { font-family:'Orbitron',monospace; font-size:1.8em; color:var(--cyan); margin-bottom:12px; }
.gorating { font-size:1.3em; color:var(--text); margin-bottom:28px; }

/* ---- CONFETTI ---- */
.cf { position:fixed; width:8px; height:8px; border-radius:2px; pointer-events:none; z-index:1000; animation:cfall 2.2s ease-in forwards; }
@keyframes cfall { 0%{transform:translateY(-40px) rotate(0deg);opacity:1;} 100%{transform:translateY(100vh) rotate(720deg);opacity:0;} }

/* ---- CHIP BUTTONS ---- */
.sec-lbl { font-family:'Orbitron',monospace; font-size:.68em; letter-spacing:2px; color:var(--cyan); margin-bottom:7px; }
.chip-group { margin-bottom:10px; }
.chip-group-lbl { font-size:.68em; color:var(--text-dim); letter-spacing:1px; margin-bottom:4px; }
.chip-row { display:flex; flex-wrap:wrap; gap:5px; }
.chip-btn {
  background:var(--bg3); border:1px solid var(--border);
  color:var(--text-dim); padding:5px 10px; font-family:inherit;
  font-size:.75em; cursor:pointer; transition:all .2s; white-space:nowrap;
}
.chip-btn:hover { border-color:var(--cyan); color:var(--cyan); background:#00f5ff0a; }
.chip-btn.on { background:#00f5ff18; border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 7px #00f5ff30; }
.chip-btn.tol.on { background:#00ff8818; border-color:var(--green); color:var(--green); box-shadow:0 0 7px #00ff8830; }
.chip-btn.preset-btn { padding:8px 10px; text-align:left; width:100%; display:block; }
.chip-btn.preset-btn.on { background:#bb44ff18; border-color:var(--purple); color:var(--purple); box-shadow:0 0 7px #bb44ff30; }
.preset-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:12px; }
.pod-block { margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.pod-block:last-child { border-bottom:none; }
.pod-summary { background:var(--bg3); border:1px solid var(--border); padding:8px 10px; font-size:.72em; color:var(--text-dim); }
.pod-summary span.active { color:var(--cyan); }
.pod-summary span.tol-active { color:var(--green); }
.pod-summary span.none { color:var(--red); }

/* ---- MISC ---- */
::-webkit-scrollbar { width:7px; height:7px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); }
::-webkit-scrollbar-thumb:hover { background:var(--cyan); }
@media(max-width:860px){ .sbx-layout{grid-template-columns:1fr;} .pod-col{grid-row:auto;} .hdr-title{font-size:1.5em;} }
.section-sep { border:none; border-top:1px solid var(--border); margin:8px 0; }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-title">☸️ K8S SCHEDULER QUEST</div>
    <div class="hdr-sub">⚡ MASTER THE ART OF POD SCHEDULING ⚡</div>
    <div class="mode-btns">
      <button class="mbtn act" id="btn-sbx" onclick="setMode('sandbox')">🏖️ SANDBOX</button>
      <button class="mbtn" id="btn-quiz" onclick="setMode('quiz')">🎮 QUIZ MODE</button>
    </div>
  </div>

  <!-- SANDBOX -->
  <div id="sandbox-mode">
    <div class="sbar">
      <span>⚙️ SETTINGS</span>
      <label>NODES: <input type="number" id="node-count" value="4" min="2" max="6" onchange="changeNodeCount()"></label>
      <button class="btn btn-c" onclick="randomizeNodes()">🎲 RANDOMIZE</button>
      <button class="btn btn-g" onclick="resetAll()">🔄 RESET</button>
      <button class="btn btn-y" onclick="randomizePod()">🎲 RANDOM POD</button>
    </div>
    <div class="sbx-layout">
      <div class="panel pod-col">
        <div class="ph">📦 POD CONFIGURATION</div>
        <div class="pb" id="pod-cfg" style="max-height:75vh;overflow-y:auto;"></div>
      </div>
      <div>
        <div class="panel" style="margin-bottom:13px">
          <div class="ph">🖥️ CLUSTER NODES — Click a node to configure it</div>
          <div id="nodes-grid" class="ngrid"></div>
        </div>
        <div class="panel">
          <div class="ph">📋 SCHEDULER LOG</div>
          <div id="sched-log" class="logbox"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-mode" style="display:none">
    <div id="quiz-content"></div>
  </div>

</div>

<!-- NODE MODAL -->
<div class="overlay" id="node-modal">
  <div class="modal">
    <div class="mhdr">
      <span id="modal-title">NODE CONFIG</span>
      <span class="mclose" onclick="closeModal()">✕</span>
    </div>
    <div class="mbody" id="modal-body"></div>
    <div class="mftr">
      <button class="btn btn-g" id="modal-save-btn" onclick="saveNodeFromModal()">💾 SAVE CHANGES</button>
      <button class="btn btn-r" onclick="closeModal()">✕ CANCEL</button>
    </div>
  </div>
</div>

<script>
'use strict';

// =========================================
// AUDIO
// =========================================
let _actx;
function initAudio(){ if(!_actx) _actx = new (window.AudioContext||window.webkitAudioContext)(); }
function tone(freq,dur,type='sine',vol=0.25){
  if(!_actx)return;
  const o=_actx.createOscillator(), g=_actx.createGain();
  o.connect(g); g.connect(_actx.destination);
  o.frequency.value=freq; o.type=type;
  g.gain.setValueAtTime(vol,_actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,_actx.currentTime+dur);
  o.start(); o.stop(_actx.currentTime+dur);
}
function sndClick(){ initAudio(); tone(880,.05,'square',.12); }
function sndOk(){ initAudio(); tone(523,.08); setTimeout(()=>tone(659,.08),80); setTimeout(()=>tone(784,.15),160); }
function sndFail(){ initAudio(); tone(220,.2,'sawtooth',.18); setTimeout(()=>tone(160,.25,'sawtooth',.12),160); }
function sndScore(){ initAudio(); [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,.12),i*90)); }
function sndFanfare(){ initAudio(); [523,659,784,1047,1319,1568,2093].forEach((f,i)=>setTimeout(()=>tone(f,.18),i*90)); }
function sndDeploy(){ initAudio(); tone(440,.06,'square',.1); setTimeout(()=>tone(660,.08,'square',.1),80); setTimeout(()=>tone(880,.12,'square',.15),160); }

// =========================================

// =========================================
// UTILS
// =========================================
function parseCPUm(pod_cpu_m){ return pod_cpu_m / 1000; }  // millicores -> cores
function availCPU(n){ return n.allocatable.cpu - n.used.cpu; }
function availMem(n){ return n.allocatable.mem - n.used.mem; }
function fmtMem(mi){
  if(mi>=1024) return (mi/1024).toFixed(1)+'Gi';
  return mi+'Mi';
}
function fmtCPU(m){ return m>=1000? (m/1000)+'':( m+'m' ); }
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

// =========================================
// SCHEDULING LOGIC
// =========================================
function checkSchedule(p, n){
  const checks = [];
  let ok = true;

  // 1. Node Ready
  if(!n.conditions.ready){
    checks.push({pass:false,rule:'Node Ready',msg:`❌ Node is NOT Ready — scheduler skips unready nodes`});
    ok=false;
  } else {
    checks.push({pass:true,rule:'Node Ready',msg:`✅ Node is Ready`});
  }

  // 2. MemoryPressure
  if(n.conditions.memPressure){
    checks.push({pass:false,rule:'MemoryPressure',msg:`❌ Node has MemoryPressure condition — pods cannot be scheduled`});
    ok=false;
  } else {
    checks.push({pass:true,rule:'MemoryPressure',msg:`✅ No MemoryPressure`});
  }

  // 3. DiskPressure
  if(n.conditions.diskPressure){
    checks.push({pass:false,rule:'DiskPressure',msg:`❌ Node has DiskPressure condition — scheduler refuses new pods`});
    ok=false;
  } else {
    checks.push({pass:true,rule:'DiskPressure',msg:`✅ No DiskPressure`});
  }

  // 4. PIDPressure
  if(n.conditions.pidPressure){
    checks.push({pass:false,rule:'PIDPressure',msg:`❌ Node has PIDPressure condition`});
    ok=false;
  }

  // 5. CPU
  const avCpu = availCPU(n);
  const reqCpu = parseCPUm(p.requests.cpu);
  if(avCpu < reqCpu){
    checks.push({pass:false,rule:'CPU Resources',msg:`❌ CPU: need ${fmtCPU(p.requests.cpu)} cores, only ${avCpu.toFixed(2)} cores available`});
    ok=false;
  } else {
    checks.push({pass:true,rule:'CPU Resources',msg:`✅ CPU OK: ${avCpu.toFixed(2)} available ≥ ${fmtCPU(p.requests.cpu)} requested`});
  }

  // 6. Memory
  const avMem = availMem(n);
  const reqMem = p.requests.mem;
  if(avMem < reqMem){
    checks.push({pass:false,rule:'Memory Resources',msg:`❌ Memory: need ${fmtMem(reqMem)}, only ${fmtMem(avMem)} available`});
    ok=false;
  } else {
    checks.push({pass:true,rule:'Memory Resources',msg:`✅ Memory OK: ${fmtMem(avMem)} available ≥ ${fmtMem(reqMem)} requested`});
  }

  // 7. NodeSelector
  const nsKeys = Object.keys(p.nodeSelector||{});
  if(nsKeys.length>0){
    let allMatch=true;
    for(const [k,v] of Object.entries(p.nodeSelector)){
      const nv = n.labels[k];
      if(nv!==v){
        checks.push({pass:false,rule:'nodeSelector',msg:`❌ nodeSelector: "${k}=${v}" — node has "${k}=${nv||'<missing>'}"`});
        ok=false; allMatch=false;
      }
    }
    if(allMatch) checks.push({pass:true,rule:'nodeSelector',msg:`✅ nodeSelector: all ${nsKeys.length} label(s) match`});
  } else {
    checks.push({pass:true,rule:'nodeSelector',msg:`✅ nodeSelector: none — all nodes eligible`});
  }

  // 8. Taints & Tolerations
  for(const taint of n.taints){
    if(taint.effect==='NoSchedule'||taint.effect==='NoExecute'){
      const tolerated = (p.tolerations||[]).some(t=>
        t.key===taint.key &&
        (t.operator==='Exists' || t.value===taint.value) &&
        (!t.effect || t.effect===taint.effect)
      );
      if(!tolerated){
        checks.push({pass:false,rule:'Taint/Toleration',msg:`❌ Taint "${taint.key}=${taint.value}:${taint.effect}" not tolerated — pod blocked!`});
        ok=false;
      } else {
        checks.push({pass:true,rule:'Taint/Toleration',msg:`✅ Taint "${taint.key}=${taint.value}:${taint.effect}" — pod has matching toleration`});
      }
    } else if(taint.effect==='PreferNoSchedule'){
      const tolerated = (p.tolerations||[]).some(t=>t.key===taint.key&&(t.operator==='Exists'||t.value===taint.value));
      checks.push({pass:true,rule:'Taint/Toleration (soft)',msg:`⚠️ PreferNoSchedule taint "${taint.key}=${taint.value}" — ${tolerated?'tolerated':'not tolerated but soft, scheduling allowed'}`});
    }
  }

  // 9. Required NodeAffinity
  for(const rule of (p.nodeAffinity?.required||[])){
    if(!rule.key||!rule.operator) continue;
    const nv = n.labels[rule.key];
    let match = evalExpr(rule, nv);
    if(!match){
      checks.push({pass:false,rule:'NodeAffinity (required)',msg:`❌ Required affinity: "${rule.key} ${rule.operator} [${(rule.values||[]).join(',')}]" — node has "${rule.key}=${nv||'<missing>'}"`});
      ok=false;
    } else {
      checks.push({pass:true,rule:'NodeAffinity (required)',msg:`✅ Required affinity satisfied: "${rule.key} ${rule.operator} [${(rule.values||[]).join(',')}]"`});
    }
  }

  return {ok, checks};
}

function evalExpr(expr, nodeVal){
  const vals = expr.values||[];
  switch(expr.operator){
    case 'In':         return vals.includes(nodeVal);
    case 'NotIn':      return !vals.includes(nodeVal);
    case 'Exists':     return nodeVal!==undefined && nodeVal!==null && nodeVal!=='';
    case 'DoesNotExist': return nodeVal===undefined || nodeVal===null || nodeVal==='';
    case 'Gt':         return parseFloat(nodeVal)>parseFloat(vals[0]||0);
    case 'Lt':         return parseFloat(nodeVal)<parseFloat(vals[0]||0);
    default:           return false;
  }
}

// ---- CHIP STATE FUNCTIONS ----
function setNSChip(group, val){
  if(!pod.nsChips) pod.nsChips={disk:'',zone:'',env:'',team:''};
  pod.nsChips[group] = val;
  pod.preset = '';
  syncPodNodeSelector();
  renderPodConfig();
  scheduleAndRender();
  sndClick();
}

function toggleTolChip(id){
  if(!pod.tolChips) pod.tolChips = new Set();
  if(pod.tolChips.has(id)) pod.tolChips.delete(id);
  else pod.tolChips.add(id);
  pod.preset = '';
  syncPodTolerations();
  renderPodConfig();
  scheduleAndRender();
  sndClick();
}

function applyPodPreset(presetId){
  const pr = POD_PRESETS.find(p=>p.id===presetId);
  if(!pr) return;
  pod.requests.cpu = pr.cpu;
  pod.requests.mem = pr.mem;
  pod.limits.cpu   = pr.cpu * 2;
  pod.limits.mem   = pr.mem * 2;
  pod.nsChips  = {...pr.nsChips};
  pod.tolChips = new Set(pr.tolChips);
  pod.preset   = presetId;
  syncPodNodeSelector();
  syncPodTolerations();
  renderPodConfig();
  scheduleAndRender();
  sndOk();
}

function syncPodNodeSelector(){
  pod.nodeSelector = {};
  const chips = pod.nsChips || {};
  Object.entries(NS_DEFS).forEach(([group,def])=>{
    const v = chips[group];
    if(v) pod.nodeSelector[def.key] = v;
  });
}

function syncPodTolerations(){
  pod.tolerations = [];
  (pod.tolChips||new Set()).forEach(id=>{
    const def = TAINT_DEFS[id];
    if(def) pod.tolerations.push({key:def.key,operator:'Equal',value:def.value,effect:def.effect});
  });
}

// ---- NODES GRID ----
function renderNodes(mode){
  const grid = document.getElementById('nodes-grid');
  if(!grid) return;
  grid.innerHTML = nodes.map(n=>{
    const res = checkSchedule(pod,n);
    const cls = mode==='quiz' ? 'q' : (res.ok?'ok':'fail');
    const avCpu = availCPU(n), avMem = availMem(n);
    const cpuPct = Math.round((n.used.cpu/n.allocatable.cpu)*100);
    const memPct = Math.round((n.used.mem/n.allocatable.mem)*100);
    const cpuCls = cpuPct>80?'high':cpuPct>60?'mid':'low';
    const memCls = memPct>80?'high':memPct>60?'mid':'low';
    const matchedLabels = new Set();
    Object.entries(pod.nodeSelector||{}).forEach(([k,v])=>{ if(n.labels[k]===v) matchedLabels.add(k); });
    const mismatchLabels = new Set();
    Object.entries(pod.nodeSelector||{}).forEach(([k,v])=>{ if(n.labels[k]!==v) mismatchLabels.add(k); });
    const labelHtml = Object.entries(n.labels).slice(0,6).map(([k,v])=>{
      const short = k.split('/').pop();
      const isMismatch = mismatchLabels.has(k);
      const isMatch = matchedLabels.has(k);
      return `<span class="lbl ${isMatch?'match':''} ${isMismatch?'mismatch':''}" title="${k}=${v}">${short}=${v}</span>`;
    }).join('');
    const taintHtml = n.taints.map(t=>
      `<span class="tbadge ${t.effect==='PreferNoSchedule'?'warn':''}" title="${t.effect}">${t.key}=${t.value}:${t.effect.replace('NoSchedule','NS').replace('PreferNoSchedule','PNS').replace('NoExecute','NE')}</span>`
    ).join('');
    const condBadges = [
      {k:'ready',lbl:'Ready',inv:false},
      {k:'memPressure',lbl:'MemPressure',inv:true},
      {k:'diskPressure',lbl:'DiskPressure',inv:true},
    ].map(c=>`<span class="cbadge ${(c.inv?!n.conditions[c.k]:n.conditions[c.k])?'good':'bad'}">${c.lbl}</span>`).join('');
    const statusTxt = mode==='quiz' ? '❓ CLICK TO SELECT' : (res.ok?'✅ SCHEDULABLE':'❌ BLOCKED');
    return `<div class="ncard ${cls}" id="ncard-${n.id}" onclick="onNodeClick(${n.id})">
      <div class="nhdr">
        <span class="nemoji">${n.emoji}</span>
        <span class="nname">${n.name}</span>
        <span class="ndot ${n.conditions.ready?'':'off'}"></span>
      </div>
      <div class="nbody">
        <div class="rbar">
          <div class="rbar-lbl"><span>🧠 MEM</span><span>${fmtMem(avMem)} free / ${fmtMem(n.allocatable.mem)} total</span></div>
          <div class="rbar-bg"><div class="rbar-fill ${memCls}" style="width:${memPct}%"></div></div>
        </div>
        <div class="rbar">
          <div class="rbar-lbl"><span>⚙️ CPU</span><span>${avCpu.toFixed(2)} free / ${n.allocatable.cpu.toFixed(1)} total</span></div>
          <div class="rbar-bg"><div class="rbar-fill ${cpuCls}" style="width:${cpuPct}%"></div></div>
        </div>
        <div class="cond-badges">${condBadges}</div>
        <div class="nlabels">${labelHtml}</div>
        ${taintHtml?`<div class="taint-badges">${taintHtml}</div>`:''}
      </div>
      <div class="nstatus ${cls}">${statusTxt}</div>
    </div>`;
  }).join('');
}

// ---- SCHEDULER LOG ----
function renderLog(results){
  const box = document.getElementById('sched-log');
  if(!box) return;
  let html='';
  html+=`<div class="le info">⟳ Scheduling ${pod.name} — ${new Date().toLocaleTimeString()}</div>`;
  html+=`<div class="le info">📦 CPU: ${fmtCPU(pod.requests.cpu)} | RAM: ${fmtMem(pod.requests.mem)} | nodeSelector: ${Object.keys(pod.nodeSelector||{}).length?JSON.stringify(pod.nodeSelector):'none'} | tolerations: ${(pod.tolerations||[]).length}</div>`;
  results.forEach(r=>{
    html+=`<div class="le node">━━ ${r.node.emoji} ${r.node.name} ━━</div>`;
    r.checks.forEach(c=>{
      const cls = c.pass?'ok':'fail';
      html+=`<div class="le ${cls}"> &nbsp; ${c.msg}</div>`;
    });
    html+=`<div class="le ${r.ok?'ok':'fail'}"> → ${r.ok?'🚀 POD CAN SCHEDULE HERE':'🚫 POD BLOCKED'}</div>`;
  });
  box.innerHTML=html;
  box.scrollTop=0;
}

function scheduleAndRender(){
  const results = nodes.map(n=>({node:n,...checkSchedule(pod,n)}));
  renderNodes('sandbox');
  renderLog(results);
}

function saveNodeFromModal(){
  const n = nodes.find(x=>x.id===modalNodeId);
  // Read name
  n.name = document.getElementById('me-name').value.trim()||n.name;
  // Read labels
  const newLabels={};
  document.querySelectorAll('.nlabel-k').forEach((kInput,i)=>{
    const k=kInput.value.trim();
    const vInput=document.querySelectorAll('.nlabel-v')[i];
    const v=vInput?vInput.value.trim():'';
    if(k) newLabels[k]=v;
  });
  n.labels=newLabels;
  // Resources
  n.capacity.cpu = +document.getElementById('me-cpu').value||n.capacity.cpu;
  n.capacity.mem = +document.getElementById('me-mem').value||n.capacity.mem;
  n.allocatable.cpu = n.capacity.cpu - 0.1;
  n.allocatable.mem = n.capacity.mem - 512;
  n.used.cpu = Math.min(+document.getElementById('me-ucpu').value, n.allocatable.cpu);
  n.used.mem = Math.min(+document.getElementById('me-umem').value, n.allocatable.mem);
  // Conditions
  n.conditions.ready       = document.getElementById('mc-ready').checked;
  n.conditions.memPressure  = document.getElementById('mc-memPressure').checked;
  n.conditions.diskPressure = document.getElementById('mc-diskPressure').checked;
  n.conditions.pidPressure  = document.getElementById('mc-pidPressure').checked;
  // Taints
  const taintRows = document.querySelectorAll('#mtaints .rule-item');
  n.taints = Array.from(taintRows).map(row=>({
    key:   row.querySelector('.mt-k').value.trim(),
    value: row.querySelector('.mt-v').value.trim(),
    effect:row.querySelector('.mt-e').value,
  })).filter(t=>t.key);
  closeModal();
  scheduleAndRender();
  sndOk();
}

function nodeToYAML(n){
  const avMem = availMem(n), avCpu = availCPU(n);
  const lines = [
    `<span class="yc"># Node object — kubectl get node ${n.name} -o yaml</span>`,
    `<span class="yk">apiVersion</span>: <span class="yv">v1</span>`,
    `<span class="yk">kind</span>: <span class="yv">Node</span>`,
    `<span class="yk">metadata</span>:`,
    `  <span class="yk">name</span>: <span class="ys">${n.name}</span>`,
    `  <span class="yk">labels</span>:`,
    ...Object.entries(n.labels).map(([k,v])=>`    <span class="yk">${k}</span>: <span class="ys">${v}</span>`),
    `<span class="yk">spec</span>:`,
    n.taints.length ? `  <span class="yk">taints</span>:` : `  <span class="yc"># no taints</span>`,
    ...n.taints.map(t=>[
      `  - <span class="yk">key</span>: <span class="ys">${t.key}</span>`,
      `    <span class="yk">value</span>: <span class="ys">${t.value}</span>`,
      `    <span class="yk">effect</span>: <span class="yv">${t.effect}</span>`,
    ].join('\n')),
    `<span class="yk">status</span>:`,
    `  <span class="yk">capacity</span>:`,
    `    <span class="yk">cpu</span>: <span class="yv">${n.capacity.cpu}</span>`,
    `    <span class="yk">memory</span>: <span class="yv">${n.capacity.mem}Mi</span>`,
    `  <span class="yk">allocatable</span>:`,
    `    <span class="yk">cpu</span>: <span class="yv">${n.allocatable.cpu.toFixed(2)}</span>`,
    `    <span class="yk">memory</span>: <span class="yv">${n.allocatable.mem}Mi</span>`,
    `  <span class="yc"># Used: cpu=${n.used.cpu.toFixed(2)} mem=${n.used.mem}Mi | Free: cpu=${avCpu.toFixed(2)} mem=${fmtMem(avMem)}</span>`,
    `  <span class="yk">conditions</span>:`,
    `  - <span class="yk">type</span>: <span class="yv">Ready</span>`,
    `    <span class="yk">status</span>: <span class="yv">${n.conditions.ready?'True':'False'}</span>`,
    `  - <span class="yk">type</span>: <span class="yv">MemoryPressure</span>`,
    `    <span class="yk">status</span>: <span class="yv">${n.conditions.memPressure?'True':'False'}</span>`,
    `  - <span class="yk">type</span>: <span class="yv">DiskPressure</span>`,
    `    <span class="yk">status</span>: <span class="yv">${n.conditions.diskPressure?'True':'False'}</span>`,
  ];
  return lines.join('\n');
}

function podToYAML(p){
  const lines = [
    `<span class="yc"># Pod spec for scheduler simulation</span>`,
    `<span class="yk">apiVersion</span>: <span class="yv">v1</span>`,
    `<span class="yk">kind</span>: <span class="yv">Pod</span>`,
    `<span class="yk">metadata</span>:`,
    `  <span class="yk">name</span>: <span class="ys">${p.name}</span>`,
    `  <span class="yk">namespace</span>: <span class="ys">${p.namespace}</span>`,
    `  <span class="yk">labels</span>:`,
    ...Object.entries(p.labels||{}).map(([k,v])=>`    <span class="yk">${k}</span>: <span class="ys">${v}</span>`),
    `<span class="yk">spec</span>:`,
    `  <span class="yk">containers</span>:`,
    `  - <span class="yk">name</span>: <span class="ys">app</span>`,
    `    <span class="yk">resources</span>:`,
    `      <span class="yk">requests</span>:`,
    `        <span class="yk">cpu</span>: <span class="yv">${fmtCPU(p.requests.cpu)}</span>`,
    `        <span class="yk">memory</span>: <span class="yv">${fmtMem(p.requests.mem)}</span>`,
    `      <span class="yk">limits</span>:`,
    `        <span class="yk">cpu</span>: <span class="yv">${fmtCPU(p.limits.cpu)}</span>`,
    `        <span class="yk">memory</span>: <span class="yv">${fmtMem(p.limits.mem)}</span>`,
  ];
  if(Object.keys(p.nodeSelector||{}).length){
    lines.push(`  <span class="yk">nodeSelector</span>:`);
    Object.entries(p.nodeSelector).forEach(([k,v])=>lines.push(`    <span class="yk">${k}</span>: <span class="ys">${v}</span>`));
  }
  if((p.tolerations||[]).length){
    lines.push(`  <span class="yk">tolerations</span>:`);
    p.tolerations.forEach(t=>{
      lines.push(`  - <span class="yk">key</span>: <span class="ys">${t.key}</span>`);
      lines.push(`    <span class="yk">operator</span>: <span class="yv">${t.operator}</span>`);
      if(t.value) lines.push(`    <span class="yk">value</span>: <span class="ys">${t.value}</span>`);
      if(t.effect) lines.push(`    <span class="yk">effect</span>: <span class="yv">${t.effect}</span>`);
    });
  }
  if((p.nodeAffinity?.required||[]).length){
    lines.push(`  <span class="yk">affinity</span>:`);
    lines.push(`    <span class="yk">nodeAffinity</span>:`);
    lines.push(`      <span class="yk">requiredDuringSchedulingIgnoredDuringExecution</span>:`);
    lines.push(`        <span class="yk">nodeSelectorTerms</span>:`);
    lines.push(`        - <span class="yk">matchExpressions</span>:`);
    p.nodeAffinity.required.forEach(r=>{
      lines.push(`          - <span class="yk">key</span>: <span class="ys">${r.key}</span>`);
      lines.push(`            <span class="yk">operator</span>: <span class="yv">${r.operator}</span>`);
      if((r.values||[]).length) lines.push(`            <span class="yk">values</span>: [<span class="ys">${r.values.join(', ')}</span>]`);
    });
  }
  return lines.join('\n');
}

// Scenario generators
const SCENARIO_GEN = [
  genMemoryScenario,

function genMemoryScenario(){
  // Exactly one node has enough free memory
  const reqMem = pick([512,1024,2048,4096,8192]);
  const qNodes = defaultNodes(4);
  // Make only one node have enough memory
  const winIdx = rnd(0,3);
  qNodes.forEach((n,i)=>{
    if(i===winIdx){
      n.allocatable.mem = reqMem + rnd(100,2000);
      n.used.mem = 0;
    } else {
      n.allocatable.mem = reqMem - rnd(10,reqMem-10);
      n.used.mem = 0;
    }
    n.taints=[];
    n.conditions={ready:true,memPressure:false,diskPressure:false,pidPressure:false};
    delete n.labels['env']; delete n.labels['team'];
  });
  const qPod = {...defaultPod(), requests:{cpu:100,mem:reqMem}, limits:{cpu:200,mem:reqMem*2}, nodeSelector:{}, tolerations:[], nodeAffinity:{required:[],preferred:[]}};
  return {
    title:'🧠 MEMORY CRUNCH',
    desc:`A pod needs ${fmtMem(reqMem)} of memory. Find the node with enough free RAM!`,
    hint:`💡 HINT: Memory bars show available RAM. Pod requests ${fmtMem(reqMem)}.`,
    nodes:qNodes, pod:qPod,
    correctIds:[winIdx],
    explanation:`The pod requested ${fmtMem(reqMem)} of memory. Only ${qNodes[winIdx].emoji} ${qNodes[winIdx].name} had enough free memory (${fmtMem(availMem(qNodes[winIdx]))}). Other nodes had insufficient RAM.`,
  };
}

function genLabelScenario(){
  const labelKey = pick(['node.kubernetes.io/disk-type','topology.kubernetes.io/zone','env','team']);
  const qNodes = defaultNodes(4);
  const winIdx = rnd(0,3);
  const winVal = qNodes[winIdx].labels[labelKey]||'special';
  // Make sure other nodes have different values
  qNodes.forEach((n,i)=>{
    if(i!==winIdx){
      const others = DISKS.concat(ZONES).concat(ENVS).filter(v=>v!==winVal);
      n.labels[labelKey] = pick(others);
    }
    n.taints=[];
    n.conditions={ready:true,memPressure:false,diskPressure:false,pidPressure:false};
    n.used.mem=100; n.used.cpu=0.1;
  });
  const qPod = {...defaultPod(), requests:{cpu:100,mem:128}, limits:{cpu:200,mem:256}, nodeSelector:{[labelKey]:winVal}, tolerations:[], nodeAffinity:{required:[],preferred:[]}};
  return {
    title:'🏷️ LABEL MATCHER',
    desc:`Pod has nodeSelector: <b style="color:var(--cyan)">${labelKey}=${winVal}</b>. Find the matching node!`,
    hint:`💡 HINT: Check node labels. Pod requires: ${labelKey}=${winVal}`,
    nodes:qNodes, pod:qPod,
    correctIds:[winIdx],
    explanation:`The pod had nodeSelector "${labelKey}=${winVal}". Only ${qNodes[winIdx].emoji} ${qNodes[winIdx].name} had the label "${labelKey}=${winVal}". The nodeSelector is a hard requirement — all other nodes were filtered out.`,
  };
}

function genTaintScenario(){
  const taintKey = pick(['dedicated','gpu','spot-instance','special']);
  const taintVal = pick(['true','backend','ml','batch']);
  const effect = pick(['NoSchedule','NoExecute']);
  const qNodes = defaultNodes(4);
  const taintedIdx = rnd(0,3);
  // Clear all taints, put taint on one, another is also tainted, pod tolerates one
  qNodes.forEach((n,i)=>{ n.taints=[]; n.used.mem=100; n.used.cpu=0.1; n.conditions={ready:true,memPressure:false,diskPressure:false,pidPressure:false}; });
  qNodes[taintedIdx].taints=[{key:taintKey,value:taintVal,effect}];
  // Another node gets a different taint (no toleration for it)
  const otherTaintIdx = (taintedIdx+1)%4;
  qNodes[otherTaintIdx].taints=[{key:'reserved',value:'ops',effect:'NoSchedule'}];
  const qPod = {
    ...defaultPod(),
    requests:{cpu:100,mem:128}, limits:{cpu:200,mem:256},
    nodeSelector:{}, nodeAffinity:{required:[],preferred:[]},
    tolerations:[{key:taintKey,operator:'Equal',value:taintVal,effect}],
  };
  // Correct = nodes WITHOUT taints + the one with a matching taint
  const correctIds = qNodes.map((n,i)=>({n,i})).filter(({n})=>n.taints.length===0||n.taints.every(t=>
    qPod.tolerations.some(tol=>tol.key===t.key&&(tol.operator==='Exists'||tol.value===t.value)&&(!tol.effect||tol.effect===t.effect))
  )).map(({i})=>i);
  return {
    title:'🛡️ TAINT TERMINATOR',
    desc:`Pod has a toleration for <b style="color:var(--red)">${taintKey}=${taintVal}:${effect}</b>. Which nodes can it schedule on?`,
    hint:`💡 HINT: Look for taint badges on nodes. Nodes with NoSchedule/NoExecute taints block pods without matching tolerations.`,
    nodes:qNodes, pod:qPod,
    correctIds,
    explanation:`Pod has toleration for "${taintKey}=${taintVal}:${effect}". Nodes with no taints always accept the pod. Node ${qNodes[taintedIdx].name} had the tainted taint — the pod tolerated it. Node ${qNodes[otherTaintIdx.name]||qNodes[otherTaintIdx].name} had taint "reserved=ops:NoSchedule" with no matching toleration — blocked!`,
  };
}

function genZoneAffinityScenario(){
  const targetZone = pick(ZONES);
  const qNodes = defaultNodes(4);
  const winIdx = rnd(0,3);
  qNodes.forEach((n,i)=>{
    if(i===winIdx) n.labels['topology.kubernetes.io/zone']=targetZone;
    else n.labels['topology.kubernetes.io/zone']=pick(ZONES.filter(z=>z!==targetZone));
    n.taints=[]; n.used.mem=100; n.used.cpu=0.1;
    n.conditions={ready:true,memPressure:false,diskPressure:false,pidPressure:false};
  });
  const qPod = {
    ...defaultPod(), requests:{cpu:100,mem:128}, limits:{cpu:200,mem:256},
    nodeSelector:{}, tolerations:[],
    nodeAffinity:{required:[{key:'topology.kubernetes.io/zone',operator:'In',values:[targetZone]}],preferred:[]},
  };
  return {
    title:'🌍 ZONE AFFINITY',
    desc:`Pod requires zone: <b style="color:var(--purple)">${targetZone}</b> via Node Affinity. Find the right node!`,
    hint:`💡 HINT: Check the "zone" label on each node. Pod's required NodeAffinity: zone In [${targetZone}]`,
    nodes:qNodes, pod:qPod,
    correctIds:[winIdx],
    explanation:`The pod had a required NodeAffinity rule: topology.kubernetes.io/zone In [${targetZone}]. Only ${qNodes[winIdx].emoji} ${qNodes[winIdx].name} was in zone "${targetZone}". Node Affinity required rules are hard constraints — the pod cannot schedule anywhere else.`,
  };
}

function genConditionScenario(){
  const qNodes = defaultNodes(4);
  const badIdx = rnd(0,3);
  const condition = pick(['memPressure','diskPressure']);
  qNodes.forEach((n,i)=>{
    n.taints=[]; n.used.mem=100; n.used.cpu=0.1;
    n.conditions={ready:true,memPressure:false,diskPressure:false,pidPressure:false};
  });
  qNodes[badIdx].conditions[condition]=true;
  // Also make one node NotReady
  const notReadyIdx = (badIdx+2)%4;
  qNodes[notReadyIdx].conditions.ready=false;
  const qPod = {...defaultPod(), requests:{cpu:100,mem:128}, limits:{cpu:200,mem:256}, nodeSelector:{}, tolerations:[], nodeAffinity:{required:[],preferred:[]}};
  const correctIds = qNodes.map((n,i)=>({n,i})).filter(({n})=>n.conditions.ready&&!n.conditions.memPressure&&!n.conditions.diskPressure).map(({i})=>i);
  return {
    title:'⚠️ NODE CONDITIONS',
    desc:`Some nodes have pressure conditions! Which nodes are healthy and can accept pods?`,
    hint:`💡 HINT: Check the condition badges (Ready/MemPressure/DiskPressure) on each node.`,
    nodes:qNodes, pod:qPod,
    correctIds,
    explanation:`Node ${qNodes[badIdx].name} had ${condition==='memPressure'?'MemoryPressure':'DiskPressure'} — the scheduler refuses to place pods there. Node ${qNodes[notReadyIdx].name} was NotReady — scheduler always skips unready nodes. The remaining nodes are healthy.`,
  };
}

function genMultiScenario(){
  // Combine: label selector + enough CPU
  const reqCPU = rnd(2,6)*1000; // millicores
  const labelKey = 'env';
  const labelVal = pick(['production','staging']);
  const qNodes = defaultNodes(4);
  const winIdx = rnd(0,3);
  qNodes.forEach((n,i)=>{
    n.taints=[]; n.conditions={ready:true,memPressure:false,diskPressure:false,pidPressure:false};
    n.used.mem=100;
    if(i===winIdx){
      n.labels[labelKey]=labelVal;
      n.capacity.cpu = reqCPU/1000+2;
      n.allocatable.cpu = n.capacity.cpu-0.1;
      n.used.cpu = 0.2;
    } else {
      // Either wrong label OR not enough CPU
      if(i%2===0){
        n.labels[labelKey]=pick(['development','testing']);
        n.capacity.cpu = reqCPU/1000+2;
        n.allocatable.cpu = n.capacity.cpu-0.1;
        n.used.cpu=0.2;
      } else {
        n.labels[labelKey]=labelVal;
        n.capacity.cpu = reqCPU/1000-1;
        n.allocatable.cpu = n.capacity.cpu-0.1;
        n.used.cpu=n.allocatable.cpu*0.95;
      }
    }
  });
  const qPod = {
    ...defaultPod(), requests:{cpu:reqCPU,mem:128}, limits:{cpu:reqCPU*2,mem:256},
    nodeSelector:{[labelKey]:labelVal}, tolerations:[], nodeAffinity:{required:[],preferred:[]},
  };
  return {
    title:'⚔️ MULTI CRITERIA',
    desc:`Pod needs label <b style="color:var(--cyan)">${labelKey}=${labelVal}</b> AND at least <b style="color:var(--orange)">${fmtCPU(reqCPU)} CPU</b>. Find the one node that satisfies BOTH!`,
    hint:`💡 HINT: CPU bars show available cores. Pod needs ${fmtCPU(reqCPU)} CPU.`,
    nodes:qNodes, pod:qPod,
    correctIds:[winIdx],
    explanation:`Pod required BOTH: nodeSelector "${labelKey}=${labelVal}" AND ${fmtCPU(reqCPU)} CPU. Some nodes had the right label but not enough CPU. Some had enough CPU but wrong label. Only ${qNodes[winIdx].emoji} ${qNodes[winIdx].name} satisfied both criteria!`,
  };
}

function generateQuizScenario(qNum){
  // Progressive difficulty: 0-2 simple, 3-6 medium, 7-9 hard
  let gen;
  if(qNum<3) gen = pick([genMemoryScenario,genLabelScenario,genTaintScenario]);
  else if(qNum<7) gen = pick([genTaintScenario,genZoneAffinityScenario,genConditionScenario,genLabelScenario]);
  else gen = pick([genMultiScenario,genZoneAffinityScenario,genTaintScenario,genConditionScenario]);
  return gen();
}

function renderQuiz(){
  const qc = document.getElementById('quiz-content');
  if(quiz.q >= quiz.max){
    renderGameOver();
    return;
  }
  if(!quiz.scenario || quiz.answered){
    quiz.scenario = generateQuizScenario(quiz.q);
    quiz.selectedNodeId = null;
    quiz.answered = false;
  }
  const sc = quiz.scenario;
  // Set global nodes for rendering
  const prevNodes = nodes;
  nodes = sc.nodes;
  const level = quiz.q<3?'🟢 EASY':quiz.q<7?'🟡 MEDIUM':'🔴 HARD';
  const correctCount = sc.correctIds.length;
  qc.innerHTML = `
    <div class="qhdr">
      <div class="qscore">⭐ SCORE: ${quiz.score} / ${quiz.max}</div>
      <div class="qprog">${level} &nbsp;|&nbsp; Question ${quiz.q+1} of ${quiz.max}</div>
      <div style="font-size:.78em;color:var(--text-dim)">🏆 Correct so far: ${quiz.score}</div>
    </div>
    <div class="qscen">
      <div class="qstitle">${sc.title}</div>
      <div class="qinstr">${sc.desc}</div>
      <div class="hint-box">${sc.hint}</div>
      <div style="margin-top:10px">
        <button class="btn btn-y" onclick="showPodYAML()">📄 VIEW POD YAML</button>
      </div>
    </div>
    <div class="qnodes" id="quiz-nodes"></div>
    <div class="qbtns">
      <button class="btn btn-g" id="quiz-submit" onclick="submitQuizAnswer()" disabled>🚀 DEPLOY TO SELECTED NODE!</button>
    </div>
    <div class="qexp" id="quiz-exp">
      <div class="qexptitle" id="qexp-title"></div>
      <div class="qexplog logbox" id="qexp-log" style="height:180px"></div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:12px">
        <button class="btn btn-c" onclick="nextQuestion()">➡️ NEXT QUESTION</button>
      </div>
    </div>
  `;
  renderQuizNodes(sc);
  nodes = prevNodes;
}

function renderQuizNodes(sc){
  const grid = document.getElementById('quiz-nodes');
  if(!grid) return;
  grid.innerHTML = sc.nodes.map((n,i)=>{
    const avCpu=availCPU(n), avMem=availMem(n);
    const cpuPct=Math.round((n.used.cpu/n.allocatable.cpu)*100);
    const memPct=Math.round((n.used.mem/n.allocatable.mem)*100);
    const cpuCls=cpuPct>80?'high':cpuPct>60?'mid':'low';
    const memCls=memPct>80?'high':memPct>60?'mid':'low';
    const taintHtml=n.taints.map(t=>`<span class="tbadge ${t.effect==='PreferNoSchedule'?'warn':''}">${t.key}:${t.effect.replace('NoSchedule','NS').replace('PreferNoSchedule','PNS').replace('NoExecute','NE')}</span>`).join('');
    const labelHtml=Object.entries(n.labels).slice(0,5).map(([k,v])=>`<span class="lbl" title="${k}=${v}">${k.split('/').pop()}=${v}</span>`).join('');
    const condBadges=[
      {k:'ready',lbl:'Ready',inv:false},{k:'memPressure',lbl:'MemPressure',inv:true},{k:'diskPressure',lbl:'DiskPressure',inv:true},
    ].map(c=>`<span class="cbadge ${(c.inv?!n.conditions[c.k]:n.conditions[c.k])?'good':'bad'}">${c.lbl}</span>`).join('');
    return `<div class="ncard q" id="qncard-${n.id}" onclick="selectQuizNode(${n.id})">
      <div class="nhdr">
        <span class="nemoji">${n.emoji}</span>
        <span class="nname">${n.name}</span>
        <span class="ndot ${n.conditions.ready?'':'off'}"></span>
      </div>
      <div class="nbody">
        <div class="rbar">
          <div class="rbar-lbl"><span>🧠 MEM</span><span>${fmtMem(avMem)} free</span></div>
          <div class="rbar-bg"><div class="rbar-fill ${memCls}" style="width:${memPct}%"></div></div>
        </div>
        <div class="rbar">
          <div class="rbar-lbl"><span>⚙️ CPU</span><span>${avCpu.toFixed(2)} free</span></div>
          <div class="rbar-bg"><div class="rbar-fill ${cpuCls}" style="width:${cpuPct}%"></div></div>
        </div>
        <div class="cond-badges">${condBadges}</div>
        <div class="nlabels">${labelHtml}</div>
        ${taintHtml?`<div class="taint-badges">${taintHtml}</div>`:''}
      </div>
      <div class="nstatus q">❓ CLICK TO SELECT</div>
    </div>`;
  }).join('');
}

function selectQuizNode(nodeId){
  if(quiz.answered) return;
  sndClick();
  quiz.selectedNodeId = nodeId;
  // Highlight selected
  document.querySelectorAll('[id^="qncard-"]').forEach(c=>{
    c.classList.remove('sel');
    c.querySelector('.nstatus').textContent='❓ CLICK TO SELECT';
  });
  const card = document.getElementById(`qncard-${nodeId}`);
  if(card){
    card.classList.add('sel');
    card.querySelector('.nstatus').textContent='👆 SELECTED';
  }
  const submitBtn = document.getElementById('quiz-submit');
  if(submitBtn) submitBtn.disabled=false;
}

function submitQuizAnswer(){
  if(quiz.answered) return;
  if(quiz.selectedNodeId===null) return;
  quiz.answered=true;
  sndDeploy();
  const sc = quiz.scenario;
  const isCorrect = sc.correctIds.includes(quiz.selectedNodeId);
  if(isCorrect){
    quiz.score++;
    sndScore();
    spawnConfetti();
  } else {
    sndFail();
  }

  // Reveal colors
  sc.nodes.forEach((n,i)=>{
    const card = document.getElementById(`qncard-${n.id}`);
    if(!card) return;
    const isWin = sc.correctIds.includes(n.id);
    const isSelected = n.id===quiz.selectedNodeId;
    card.classList.remove('sel','q');
    if(isWin){ card.classList.add('qok'); card.querySelector('.nstatus').textContent='✅ CORRECT!'; }
    else if(isSelected&&!isWin){ card.classList.add('qfail'); card.querySelector('.nstatus').textContent='❌ WRONG'; }
    else { card.querySelector('.nstatus').textContent='—'; }
  });

  // Show explanation
  const expDiv = document.getElementById('quiz-exp');
  const expTitle = document.getElementById('qexp-title');
  const expLog = document.getElementById('qexp-log');
  expDiv.classList.add('show');
  expTitle.textContent = isCorrect ? '🎉 CORRECT! WELL DONE!' : '💀 WRONG! HERE\'S WHY:';
  expTitle.className = `qexptitle ${isCorrect?'ok':'fail'}`;

  let html='';
  html+=`<div class="le info">📦 Pod: ${sc.pod.name} | CPU: ${fmtCPU(sc.pod.requests.cpu)} | RAM: ${fmtMem(sc.pod.requests.mem)}</div>`;
  sc.nodes.forEach(n=>{
    const res = checkSchedule(sc.pod,n);
    const isWin = sc.correctIds.includes(n.id);
    html+=`<div class="le node">━━ ${n.emoji} ${n.name} ${isWin?'✅ SCHEDULABLE':'❌ BLOCKED'} ━━</div>`;
    res.checks.forEach(c=>{ html+=`<div class="le ${c.pass?'ok':'fail'}"> &nbsp;${c.msg}</div>`; });
  });
  html+=`<div class="le info" style="margin-top:7px">💡 ${sc.explanation}</div>`;
  expLog.innerHTML=html;
  expLog.scrollTop=0;
  document.getElementById('quiz-submit').disabled=true;
}

function nextQuestion(){
  quiz.q++;
  quiz.answered=false;
  quiz.selectedNodeId=null;
  quiz.scenario=null;
  sndClick();
  renderQuiz();
}

function renderGameOver(){
  const score=quiz.score, max=quiz.max;
  const pct = score/max;
  const rating = pct>=0.9?'🏆 K8S MASTER!':pct>=0.7?'⭐ SENIOR ENGINEER!':pct>=0.5?'🎓 JUNIOR DEVOPS':pct>=0.3?'🐣 POD PADAWAN':'💀 KUBECTL NOOB';
  const msg = pct>=0.9?'You understand the Kubernetes scheduler at a deep level. Go build some clusters! 🚀':
              pct>=0.7?'Solid understanding! A few edge cases to polish. Keep deploying! ⚡':
              pct>=0.5?'Getting there! Review taints, node affinity, and resource requests. 📚':
              'Time to read the Kubernetes docs! Start with the scheduling section. 🤓';
  document.getElementById('quiz-content').innerHTML = `
    <div class="gameover">
      <div class="gotitle">🎮 GAME OVER</div>
      <div class="goscore">SCORE: ${score} / ${max}</div>
      <div class="gorating">${rating}</div>
      <div style="color:var(--text-dim);font-size:.88em;margin-bottom:30px;max-width:500px;margin-left:auto;margin-right:auto">${msg}</div>
      <div style="display:flex;gap:14px;justify-content:center;">
        <button class="btn btn-c" onclick="restartQuiz()">🔄 PLAY AGAIN</button>
        <button class="btn btn-g" onclick="setMode('sandbox')">🏖️ EXPLORE SANDBOX</button>
      </div>
    </div>
  `;
  sndFanfare();
  spawnConfetti(60);
}

function restartQuiz(){
  quiz = {score:0,q:0,max:10,scenario:null,selectedNodeId:null,answered:false,history:[]};
  renderQuiz();
  sndClick();
}

function showPodYAML(){
  const sc = quiz.scenario;
  if(!sc) return;
  const yaml = podToYAML(sc.pod);
  document.getElementById('modal-title').textContent='📦 POD SPEC (READ-ONLY)';
  document.getElementById('modal-save-btn').style.display='none';
  document.getElementById('modal-body').innerHTML=buildYAMLView(yaml);
  document.getElementById('node-modal').classList.add('show');
  sndClick();
}

// =========================================
// CONFETTI
// =========================================
function spawnConfetti(count=30){
  const colors=['#00f5ff','#00ff88','#ffd700','#bb44ff','#ff9900','#ff44bb'];
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const d=document.createElement('div');
      d.className='cf';
      d.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*30}%;background:${pick(colors)};animation-duration:${1.5+Math.random()*1.5}s;animation-delay:${Math.random()*0.5}s;border-radius:${Math.random()>0.5?'50%':'2px'}`;
      document.body.appendChild(d);
      setTimeout(()=>d.remove(),3500);
    },i*30);
  }
}

// =========================================
// MODE SWITCHING
// =========================================
function setMode(mode){
  currentMode=mode;
  sndClick();
  document.getElementById('sandbox-mode').style.display = mode==='sandbox'?'':'none';
  document.getElementById('quiz-mode').style.display    = mode==='quiz'?'':'none';
  document.getElementById('btn-sbx').classList.toggle('act', mode==='sandbox');
  document.getElementById('btn-quiz').classList.toggle('act', mode==='quiz');
  if(mode==='quiz'){
    quiz={score:0,q:0,max:10,scenario:null,selectedNodeId:null,answered:false,history:[]};
    renderQuiz();
  } else {
    scheduleAndRender();
  }
}

// =========================================
// SETTINGS
// =========================================
function changeNodeCount(){
  const val = +document.getElementById('node-count').value;
  const count = Math.min(Math.max(val,2),6);
  nodes = defaultNodes(count);
  pod = defaultPod();
  renderPodConfig();
  scheduleAndRender();
  sndClick();
}

function randomizeNodes(){
  const count = +document.getElementById('node-count').value||4;
  nodes = defaultNodes(count);
  nodes.forEach(n=>{
    n.used.cpu = Math.random()*n.allocatable.cpu*0.85;
    n.used.mem = Math.random()*n.allocatable.mem*0.85;
    // Random chance of a taint
    if(Math.random()>0.6){
      const taintKeys=['gpu','dedicated','spot','reserved','high-memory'];
      const taintVals=['true','yes','backend','ops','ml'];
      n.taints=[{key:pick(taintKeys),value:pick(taintVals),effect:pick(TAINT_EFFECTS)}];
    }
    // Random chance of a condition issue
    if(Math.random()>0.85) n.conditions.memPressure=true;
    if(Math.random()>0.92) n.conditions.ready=false;
  });
  scheduleAndRender();
  sndOk();
}

function resetAll(){
  const count = +document.getElementById('node-count').value||4;
  nodes = defaultNodes(count);
  pod = defaultPod();
  renderPodConfig();
  scheduleAndRender();
  sndOk();
}

function randomizePod(){
  const pr = pick(POD_PRESETS);
  applyPodPreset(pr.id);
  // Randomize resources slightly
  pod.requests.cpu = pick([100,200,500,1000,2000,4000]);
  pod.requests.mem = pick([128,256,512,1024,2048,4096]);
  renderPodConfig();
  scheduleAndRender();
  sndOk();
}

// =========================================
// INIT
// =========================================
function init(){
  nodes = defaultNodes(4);
  pod = defaultPod();
  renderPodConfig();
  scheduleAndRender();
}

// Keyboard: Escape closes modal
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
});

init();
</script>
